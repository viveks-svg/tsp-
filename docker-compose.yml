services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Prvind123
      POSTGRES_DB: tsp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tsp_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tsp_network

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:Prvind123@postgres:5432/tsp_dev?schema=public
      JWT_SECRET: production-secret-key-please-change
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - tsp_network

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3001/api
    ports:
      - "3002:3000"
    depends_on:
      - api
    networks:
      - tsp_network

volumes:
  postgres_data:
  redis_data:

networks:
  tsp_network:
    driver: bridge
